services:
  app:
    build: .
    image: hotelhub/hms:dev
    env_file: .env
    volumes:
      - ./storage:/var/www/storage
      - ./public/uploads:/var/www/public/uploads
    ports:
      - "8080:80"
    depends_on: [db, redis, meilisearch]
    networks: [back]

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-hms_secret}
      MYSQL_DATABASE: ${DB_DATABASE:-hotel_main}
      MYSQL_USER: ${DB_USERNAME:-hms}
      MYSQL_PASSWORD: ${DB_PASSWORD:-hms_secret}
    volumes:
      - mysqldata:/var/lib/mysql
    ports:
      - "3306:3306"
    networks: [back]
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secret}
    volumes: [redisdata:/data]
    networks: [back]

  meilisearch:
    image: getmeili/meilisearch:v1.10
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-meili_master_key_change_me}
    volumes: [meilidata:/meili_data]
    networks: [back]

volumes:
  mysqldata:
  redisdata:
  meilidata:

networks:
  back:

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    name: PHP Tests

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: hms_test
          MYSQL_DATABASE: hotel_test
          MYSQL_USER: hms
          MYSQL_PASSWORD: hms_test
        ports: ['3306:3306']
        options: >-
          --health-cmd "mysqladmin ping --silent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, intl, pdo_mysql, redis, gd, imagick
          coverage: pcov
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Copy .env
        run: cp .env.example .env

      - name: Generate key
        run: php artisan key:generate

      - name: Run migrations
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: hotel_test
          DB_USERNAME: hms
          DB_PASSWORD: hms_test
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
        run: php artisan migrate --force

      - name: Run Pest
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: hotel_testing
          DB_USERNAME: hms
          DB_PASSWORD: hms_test
          CACHE_STORE: array
          QUEUE_CONNECTION: sync
          SESSION_DRIVER: array
        run: php vendor/bin/pest --coverage --min=20

  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
      - name: Install
        run: composer install --no-dev --no-interaction --prefer-dist
      - name: Pint check
        run: composer require laravel/pint --dev && ./vendor/bin/pint --test
        continue-on-error: true

  security:
    runs-on: ubuntu-latest
    name: Security
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2
      - name: Install
        run: composer install --no-interaction --prefer-dist
      - name: Composer audit
        run: composer audit --no-interaction || true

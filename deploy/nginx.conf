server {
    listen 80;
    server_name your-hotel-domain.com;
    root /var/www/hotel/public;
    index index.php;

    charset utf-8;
    client_max_body_size 64M;

    # ─── Security Headers ────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ─── Gzip Compression ────────────────────────
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/javascript
        application/json
        application/xml
        application/rss+xml
        image/svg+xml;

    # ─── Block access to sensitive files ─────────
    location ~ /\.(?!well-known).* {
        deny all;
    }

    location ~ ^/(composer\.(json|lock)|package\.json|package-lock\.json|\.env|README\.md|DEPLOYMENT\.md|artisan|phpunit\.xml) {
        deny all;
    }

    # ─── Marketing assets (public cache) ─────────
    location /marketing/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ─── Docs (public) ───────────────────────────
    location /docs {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ─── Sitemap ─────────────────────────────────
    location = /sitemap.xml {
        try_files $uri /index.php?$query_string;
    }

    location = /robots.txt {
        try_files $uri /index.php?$query_string;
    }

    # ─── Webhook endpoints (no CSRF) ─────────────
    location /webhook/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ─── Laravel Application ─────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ─── PHP-FPM ─────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;

        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 300;

        fastcgi_hide_header X-Powered-By;
    }

    # ─── Static assets (long cache) ──────────────
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff2?|ttf|eot)$ {
        expires 180d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ─── Deny hidden files ───────────────────────
    location ~ /\.ht {
        deny all;
    }
}


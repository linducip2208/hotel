# HotelHub HMS — Client-side Nginx Configuration
#
# Target: Hotel property VPS running the HMS application
# Domain: hotel.example.com (replace with actual property domain)

# ── Rate limiting zones ───────────────────────────────────────────
# Booking engine: 60 req/min (prevents scraping from OTAs)
# Standard API: 300 req/min
limit_req_zone $binary_remote_addr zone=booking:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api:10m rate=300r/m;
limit_conn_zone $binary_remote_addr zone=connlimit:10m;

# ── Upstream: PHP-FPM ────────────────────────────────────────────
upstream php-upstream {
    server 127.0.0.1:9000;
    # server unix:/run/php/php8.3-fpm.sock;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name hotel.example.com www.hotel.example.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/hotelhub/public;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main server block ────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hotel.example.com www.hotel.example.com;

    root /var/www/hotelhub/public;
    index index.php;

    charset utf-8;
    client_max_body_size 64M;

    # ── SSL Configuration ────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/hotel.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hotel.example.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── Security Headers ─────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;

    # ── WWW → non-WWW redirect ───────────────────────────────────
    if ($host = www.hotel.example.com) {
        return 301 https://hotel.example.com$request_uri;
    }

    # ── Gzip Compression ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        application/atom+xml
        application/x-javascript
        image/svg+xml;

    # ── Logging ──────────────────────────────────────────────────
    access_log /var/log/nginx/hotelhub.access.log combined buffer=512k flush=1m;
    error_log  /var/log/nginx/hotelhub.error.log warn;

    # ── Deny hidden files ────────────────────────────────────────
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Deny sensitive paths ─────────────────────────────────────
    location ~* ^/(\.env|composer\.(json|lock)|package\.json|phpunit\.xml|artisan|\.git) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Static asset caching ─────────────────────────────────────
    # Vite/manifest build assets — cache 1 year (fingerprinted)
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Uploaded media — cache 7 days
    location /uploads/ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    # General static assets — cache 30 days
    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    # ── Booking Engine (public-facing) — stricter rate limit ─────
    location ~ ^/(booking|search|rooms|rates|availability) {
        limit_req zone=booking burst=10 nodelay;
        limit_conn connlimit 20;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── API endpoints ────────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=30 nodelay;
        limit_conn connlimit 30;
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Health check (no rate limit) ─────────────────────────────
    location = /api/health {
        access_log off;
        try_files $uri $uri/ /index.php?$query_string;
        fastcgi_pass php-upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 5s;
    }

    # ── Admin panel ──────────────────────────────────────────────
    location /admin {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Main application router ──────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM processing ───────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass php-upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "upload_max_filesize=64M \n post_max_size=64M";
        include fastcgi_params;
        fastcgi_read_timeout 300s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # ── Custom error pages ───────────────────────────────────────
    error_page 403 /index.php;
    error_page 404 /index.php;
    error_page 500 502 503 504 /index.php;
}

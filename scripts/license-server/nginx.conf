# HotelHub License Server — Nginx Configuration
#
# Target: Ubuntu/Debian VPS or Docker container
# Domain: license.hotelhub.id (replace with your domain)

# ── Rate limiting zones ───────────────────────────────────────────
# Global: 200 req/s for standard API
# Heartbeat: 100 req/min per IP (burst 20)
limit_req_zone $binary_remote_addr zone=api:10m rate=200r/s;
limit_req_zone $binary_remote_addr zone=heartbeat:10m rate=100r/m;
limit_conn_zone $binary_remote_addr zone=connlimit:10m;

# ── Upstream: PHP-FPM ────────────────────────────────────────────
upstream php-upstream {
    server 127.0.0.1:9000;
    # For Docker: server app:9000;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name license.hotelhub.id;

    # Let's Encrypt challenge
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/license-server/public;
        default_type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main server block ────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name license.hotelhub.id;

    root /var/www/license-server/public;
    index index.php;

    charset utf-8;
    client_max_body_size 64M;

    # ── SSL Configuration ────────────────────────────────────────
    # Replace paths with actual Let's Encrypt certificate paths
    ssl_certificate     /etc/letsencrypt/live/license.hotelhub.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/license.hotelhub.id/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ── Security Headers ─────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header X-Permitted-Cross-Domain-Policies "none" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # ── Gzip Compression ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/rss+xml
        application/atom+xml
        application/x-javascript
        image/svg+xml;

    # ── Logging ──────────────────────────────────────────────────
    access_log /var/log/nginx/license.access.log combined buffer=512k flush=1m;
    error_log  /var/log/nginx/license.error.log warn;

    # ── Deny hidden files ────────────────────────────────────────
    location ~ /\.(?!well-known) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Deny sensitive paths ─────────────────────────────────────
    location ~* ^/(storage/app/vendor-private\.pem|\.env|composer\.(json|lock)|package\.json|artisan) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Static asset caching ─────────────────────────────────────
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location /vendor/ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    location ~* \.(?:css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public";
        access_log off;
        try_files $uri =404;
    }

    # ── Public API: Pairing + Heartbeat ──────────────────────────
    location ~ ^/api/license/(pair|migrate|unpair) {
        limit_req zone=api burst=10 nodelay;
        limit_conn connlimit 20;
        try_files $uri $uri/ /index.php?$query_string;
        fastcgi_pass php-upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 30s;
    }

    # ── Heartbeat endpoint: stricter rate limit ──────────────────
    location = /api/license/heartbeat {
        limit_req zone=heartbeat burst=20 nodelay;
        limit_conn connlimit 50;
        try_files $uri $uri/ /index.php?$query_string;
        fastcgi_pass php-upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 15s;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Health check endpoint (no rate limit) ────────────────────
    location = /api/health {
        access_log off;
        try_files $uri $uri/ /index.php?$query_string;
        fastcgi_pass php-upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 5s;
    }

    # ── Admin panel ──────────────────────────────────────────────
    location /admin {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── Main application ─────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM processing ───────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_pass php-upstream;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PHP_VALUE "upload_max_filesize=64M \n post_max_size=64M";
        include fastcgi_params;
        fastcgi_read_timeout 300s;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
    }

    # ── Custom error pages ───────────────────────────────────────
    error_page 403 /index.php;
    error_page 404 /index.php;
    error_page 500 502 503 504 /index.php;
}
